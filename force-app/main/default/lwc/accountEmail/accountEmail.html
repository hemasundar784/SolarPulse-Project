<template>
    <lightning-card title="Send Accounts via Email">
        <div class="slds-p-around_medium">
            <lightning-input label="Recipient Email" name="email" value={email} onchange={handleChange}></lightning-input>
            <lightning-input label="Subject" name="subject" value={subject} onchange={handleChange}></lightning-input>
            <lightning-textarea label="Body" name="body" value={body} onchange={handleChange}></lightning-textarea>
            <lightning-input type="number" label="Number of Records" name="recordLimit" value={recordLimit} onchange={handleChange}></lightning-input>

            <div class="slds-m-top_medium">
                <lightning-button label="Send Email" onclick={handleSend} class="slds-m-right_small"></lightning-button>
                <lightning-button label="Download Accounts" onclick={handleDownload} variant="brand"></lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
