<template>
    <lightning-card title="Send Leads via Email">
        <div class="slds-p-around_medium">
            <!-- Recipient Email -->
            <lightning-input 
                label="Recipient Email" 
                name="email" 
                value={email} 
                onchange={handleChange}>
            </lightning-input>

            <!-- Subject -->
            <lightning-input 
                label="Subject" 
                name="subject" 
                value={subject} 
                onchange={handleChange}>
            </lightning-input>

            <!-- Body -->
            <lightning-textarea 
                label="Body" 
                name="body" 
                value={body} 
                onchange={handleChange}>
            </lightning-textarea>

            <!-- Action Buttons -->
            <div class="slds-m-top_medium">
                <lightning-button 
                    label="Send Email" 
                    onclick={handleSend} 
                    class="slds-m-right_small send-btn">
                </lightning-button>

                <lightning-button 
                    label="Download Leads" 
                    onclick={handleDownload} 
                    variant="brand">
                </lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
