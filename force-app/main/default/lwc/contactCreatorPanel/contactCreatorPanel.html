<template>
    <lightning-card title="Create Contact">
        <template lwc:if={accountId}>
            <div class="slds-p-around_small">
                <lightning-record-edit-form object-api-name={objectApiName}
                    density="compact" onsubmit={handleSave} onsuccess={handleSuccess} onerror={handleError}>
                        <lightning-input-field 
                            field-name="AccountId" value={accountId} disabled></lightning-input-field>
                    <template for:each={fields} for:item="field">
                        <lightning-input-field class="cfield"
                            key={field} field-name={field}></lightning-input-field>
                    </template>
                    <div class="slds-align_absolute-center slds-p-around_small">
                        <lightning-button variant="brand-outline" 
                            type="submit" label="Save"></lightning-button>
                    </div>
                </lightning-record-edit-form>
            </div>
        </template>
        <template lwc:else>
            <div class="slds-p-around_medium slds-align_absolute-center">
                <p class="slds-text-color_weak">Select an Account to create a contact on it.</p>
            </div>
        </template>
    </lightning-card>
</template>
