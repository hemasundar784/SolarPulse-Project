<template>
    <lightning-card title="Installation List" icon-name="standard:people">
        <!-- Data Table -->
        <template if:true={hasCandidates}>
            <div style="max-height: 350px; overflow-y: auto;">
                <lightning-datatable
                    key-field="Id" data={filteredData} columns={tableColumns}
                    hide-checkbox-column show-row-number-column></lightning-datatable>
            </div>
        </template>
        <!-- Empty State -->
        <template if:false={hasCandidates}>
            <div class="slds-p-around_medium slds-align_absolute-center">
                <p class="slds-text-color_weak">
                    No candidates found.
                </p>
            </div>
        </template>
    </lightning-card>
</template>
