<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Solar Quotation Estimator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Solar Quotation Estimator</h1>
  </header>

  <main>
    <!-- Form View -->
    <form id="estimatorForm">
      <label for="area">Area (sq. feet):</label>
      <input type="number" id="area" placeholder="e.g. 500" required>

      <label for="model">System Model:</label>
      <select id="model">
        <option value="basic">SolarPulse Basic 3kW System</option>
        <option value="standard">SolarPulse Standard 5kW System</option>
        <option value="pro">SolarPulse Pro 7kW System</option>
        <option value="premium">SolarPulse Premium 10kW System</option>
        <option value="ultra">SolarPulse Ultra 15kW System</option>
      </select>

      <label for="phone">Lead Phone No:</label>
      <input type="text" id="phone" placeholder="Enter phone number">

      <button type="button" onclick="calculate()">Estimate</button>
      <button type="button" onclick="back()">back</button>
    </form>

    <!-- Results View -->
    <section id="results" class="hidden">
      <h2>Estimation Results</h2>
      
      <div id="resultsContent">
        <p id="systemModel"></p>
        <p id="capacity"></p>
        <p id="panels"></p>
        <p id="cost"></p>
        <p id="subsidy"></p>
        <p id="electricity"></p>
        <p id="monthly"></p>
        <p id="yearly"></p>
        <p id="longTerm"></p>
        <p id="payback"></p>
        <p id="roi"></p>
      </div>

      <div class="button-group">
        <button type="button" onclick="goBack()">Back / Edit</button>
        <button type="button" onclick="downloadPDF()">Download Estimation Slip (PDF)</button>
      </div>
    </section>
  </main>

  <!-- Make sure jsPDF library is included -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
