<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Solar Quotation Estimator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Solar Quotation Estimator</h1>
  </header>

  <main>
    <form id="estimatorForm">
      <label>Area (sq. feet):</label>
      <input type="number" id="area" required>

      <label>Panel Model:</label>
      <select id="model">
        <option value="standard">Standard (Average cost: ₹10,000,electricity generated: 40 kWh/month)</option>
        <option value="premium">Premium (Average cost: ₹15,000,electricity generated: 55 kWh/month)</option>
        <option value="high">High-Efficiency (Average cost: ₹20,000,electricity generated: 70 kWh/month)</option>
      </select>

      <label>Lead Phone No:</label>
      <input type="text" id="phone" value="" placeholder="no need to Enter phone number" required>

      <button type="button" onclick="calculate()">Estimate</button>
    </form>

    <section id="results" class="hidden">
      <h2>Estimation Results</h2>
      <p id="panels"></p>
      <p id="cost"></p>
      <p id="electricity"></p>
      <p id="monthly"></p>
      <p id="yearly"></p>
      <button onclick="downloadPDF()">Download Estimation Slip (PDF)</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
